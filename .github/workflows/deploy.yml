name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - run: npm run lint

      - run: npx tsc --noEmit

      - run: npm run build
        env:
          GITHUB_SHA: ${{ github.sha }}

      - name: Stage site
        run: |
          SHORT=$(echo "${GITHUB_SHA}" | cut -c1-7)
          mkdir -p _site
          sed "s/?v=dev/?v=${SHORT}/" index.html > _site/index.html
          cp motion_capture.js _site/
        env:
          GITHUB_SHA: ${{ github.sha }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
